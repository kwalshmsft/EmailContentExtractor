<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="EmailContentExtractor.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>Email Content Extractor</title>
</head>

<body>
    <div id="app">
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.downloadFile = function (fileName, contentType, byteArray) {
            var blob = new Blob([new Uint8Array(byteArray)], { type: contentType });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        window.htmlEditor = {
            _attachHandlers: function (doc, dotNetRef) {
                doc.addEventListener('click', function (e) {
                    // Image click
                    if (e.target.tagName === 'IMG') {
                        e.preventDefault();
                        e.stopPropagation();
                        var images = doc.querySelectorAll('img');
                        var index = Array.prototype.indexOf.call(images, e.target);
                        dotNetRef.invokeMethodAsync('OnImageClicked', index,
                            e.target.getAttribute('src') || '',
                            e.target.getAttribute('alt') || '');
                        return;
                    }
                    // Link click — walk up to find <a>
                    var el = e.target;
                    while (el && el.tagName !== 'A' && el !== doc.body) {
                        el = el.parentElement;
                    }
                    if (el && el.tagName === 'A') {
                        e.preventDefault();
                        e.stopPropagation();
                        var links = doc.querySelectorAll('a[href]');
                        var index = Array.prototype.indexOf.call(links, el);
                        dotNetRef.invokeMethodAsync('OnLinkClicked', index,
                            el.getAttribute('href') || '',
                            el.getAttribute('alias') || '',
                            el.textContent || '');
                    }
                });
            },

            init: function (iframeId, htmlContent, dotNetRef) {
                var iframe = document.getElementById(iframeId);
                if (!iframe) return;

                var doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write(htmlContent);
                doc.close();
                doc.designMode = 'on';

                this._attachHandlers(doc, dotNetRef);
                iframe._dotNetRef = dotNetRef;
            },

            getContent: function (iframeId) {
                var iframe = document.getElementById(iframeId);
                if (!iframe) return '';
                var doc = iframe.contentDocument || iframe.contentWindow.document;
                return doc.documentElement.outerHTML;
            },

            setContent: function (iframeId, htmlContent) {
                var iframe = document.getElementById(iframeId);
                if (!iframe) return;
                var dotNetRef = iframe._dotNetRef;
                var doc = iframe.contentDocument || iframe.contentWindow.document;
                doc.open();
                doc.write(htmlContent);
                doc.close();
                doc.designMode = 'on';

                if (dotNetRef) {
                    window.htmlEditor._attachHandlers(doc, dotNetRef);
                }
            },

            updateImage: function (iframeId, imageIndex, newSrc, newAlt) {
                var iframe = document.getElementById(iframeId);
                if (!iframe) return;
                var doc = iframe.contentDocument || iframe.contentWindow.document;
                var images = doc.querySelectorAll('img');
                if (imageIndex >= 0 && imageIndex < images.length) {
                    images[imageIndex].setAttribute('src', newSrc);
                    images[imageIndex].setAttribute('alt', newAlt);
                }
            },

            updateLink: function (iframeId, linkIndex, newHref, newAlias) {
                var iframe = document.getElementById(iframeId);
                if (!iframe) return;
                var doc = iframe.contentDocument || iframe.contentWindow.document;
                var links = doc.querySelectorAll('a[href]');
                if (linkIndex >= 0 && linkIndex < links.length) {
                    links[linkIndex].setAttribute('href', newHref);
                    if (newAlias) {
                        links[linkIndex].setAttribute('alias', newAlias);
                    } else {
                        links[linkIndex].removeAttribute('alias');
                    }
                }
            }
        };

        window.openBlobUrl = function (content, contentType, fileName) {
            var blob = new Blob([new Uint8Array(content)], { type: contentType });
            var url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        };
    </script>
</body>

</html>
